version: 2

project_name: codex-retry-gateway

before:
  hooks:
    - go mod tidy

builds:
  - id: codex-retry-gateway-linux-amd64
    main: .
    binary: codex-retry-gateway-go
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
    buildmode: c-shared
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: linux-amd64
    ids:
      - codex-retry-gateway-linux-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - config.example.yaml

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: Av1anJay
    name: cliproxyapi-retry-gateway
  draft: false
  prerelease: auto
  mode: replace
  header: |
    CLIProxyAPI plugin port of codex-retry-gateway reasoning-token retry interception.

    Add the built `.so` to `plugins.path` and configure `plugins.configs.codex-retry-gateway`.
  footer: |
    Generated by GoReleaser.

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

report_sizes: true
