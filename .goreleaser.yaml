version: 2

project_name: codex-retry-gateway

before:
  hooks:
    - go mod tidy

builds:
  - id: linux-amd64
    main: .
    binary: codex-retry-gateway-go
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=gcc
    buildmode: c-shared
    flags: [-trimpath]
    ldflags: [-s -w]

  - id: linux-arm64
    main: .
    binary: codex-retry-gateway-go
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    buildmode: c-shared
    flags: [-trimpath]
    ldflags: [-s -w]

  - id: windows-amd64
    main: .
    binary: codex-retry-gateway-go
    goos: [windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
    buildmode: c-shared
    flags: [-trimpath]
    ldflags: [-s -w]

archives:
  - id: linux-amd64
    ids: [linux-amd64]
    name_template: "{{ .ProjectName }}_{{ .Version }}_linux_amd64"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - config.example.yaml

  - id: linux-arm64
    ids: [linux-arm64]
    name_template: "{{ .ProjectName }}_{{ .Version }}_linux_arm64"
    formats: [tar.gz]
    files:
      - README.md
      - LICENSE
      - config.example.yaml

  - id: windows-amd64
    ids: [windows-amd64]
    name_template: "{{ .ProjectName }}_{{ .Version }}_windows_amd64"
    formats: [zip]
    files:
      - README.md
      - LICENSE
      - config.example.yaml

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: Av1anJay
    name: cliproxyapi-retry-gateway
  draft: false
  prerelease: auto
  mode: replace
  header: |
    CLIProxyAPI plugin port of codex-retry-gateway reasoning-token retry interception.

    Add the built plugin library to `plugins.path` and configure `plugins.configs.codex-retry-gateway`.
  footer: |
    Generated by GoReleaser.

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

report_sizes: true
